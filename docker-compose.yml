name: bus-booking
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: bus_booking
      POSTGRES_USER: bus_booking
      POSTGRES_PASSWORD: bus_booking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bus_booking -d bus_booking"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bus_booking:bus_booking@postgres:5432/bus_booking
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_CONN_MAX_AGE: 0
    command: ["sh", "-c", "python manage.py migrate && uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers $${WEB_CONCURRENCY:-2} --proxy-headers --forwarded-allow-ips='*'"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bus_booking:bus_booking@postgres:5432/bus_booking
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: ["celery", "-A", "config", "worker", "-l", "INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./apps/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bus_booking:bus_booking@postgres:5432/bus_booking
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: ["celery", "-A", "config", "beat", "-l", "INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
