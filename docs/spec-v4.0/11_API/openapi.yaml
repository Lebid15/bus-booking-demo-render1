components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
      - code
      - message
      - request_id
      - retryable
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
          format: uuid
        retryable:
          type: boolean
        details:
          type: array
          items:
            type: object
            additionalProperties: true
    Money:
      type: object
      required:
      - amount
      - currency
      properties:
        amount:
          type: string
          pattern: ^-?\d+(\.\d{1,2})?$
        currency:
          type: string
          minLength: 3
          maxLength: 3
    PassengerInput:
      type: object
      required:
      - full_name
      - gender
      - passenger_type
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 160
        gender:
          type: string
          enum:
          - male
          - female
        passenger_type:
          type: string
          enum:
          - adult
          - child
          - infant
        date_of_birth:
          type:
          - string
          - 'null'
          format: date
        nationality_code:
          type:
          - string
          - 'null'
          minLength: 2
          maxLength: 2
        seat_id:
          type: string
          format: uuid
    TripSummary:
      type: object
      required:
      - id
      - office
      - origin
      - destination
      - departure_at
      - currency
      - from_price
      - available_seats
      properties:
        id:
          type: string
        office:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        operator:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        origin:
          $ref: '#/components/schemas/Location'
        destination:
          $ref: '#/components/schemas/Location'
        departure_at:
          type: string
          format: date-time
        arrival_at:
          type:
          - string
          - 'null'
          format: date-time
        currency:
          type: string
        from_price:
          type: string
        available_seats:
          type: integer
        payment_methods:
          type: array
          items:
            type: string
        cancellation_summary:
          type: string
    Location:
      type: object
      required:
      - id
      - name
      - type
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        address:
          type:
          - string
          - 'null'
    SeatMap:
      type: object
      required:
      - trip_id
      - layout_version
      - seats
      properties:
        trip_id:
          type: string
        layout_version:
          type: integer
        expires_at:
          type: string
          format: date-time
        seats:
          type: array
          items:
            $ref: '#/components/schemas/SeatAvailability'
    SeatAvailability:
