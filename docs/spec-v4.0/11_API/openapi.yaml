openapi: 3.1.0
info:
  title: Bus Booking Platform API
  version: 3.0.0
  description: Normative phase-1 API contract. All money is decimal strings; all mutations require Idempotency-Key where marked
    by domain rules.
servers:
- url: https://api.example.invalid
  description: placeholder
tags:
- name: Public
- name: Booking
- name: Payments
- name: Auth
- name: Customer
- name: Privacy
- name: Office
- name: Office Trips
- name: Office Booking
- name: Office Payments
- name: Office Finance
- name: Boarding
- name: Support
- name: Platform
- name: Platform Compliance
- name: Platform Support
- name: Platform Finance
- name: Platform Policies
- name: Webhooks
paths:
  /v1/public/locations:
    get:
      summary: قائمة نقاط الانطلاق والوصول
      tags:
      - Public
      operationId: listLocations
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
  /v1/public/trips/search:
    get:
      summary: البحث عن الرحلات
      tags:
      - Public
      operationId: searchTrips
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripSummary'
        '422':
          description: VALIDATION_ERROR
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      parameters:
      - name: origin_id
        in: query
        required: true
        schema:
          type: string
      - name: destination_id
        in: query
        required: true
        schema:
          type: string
      - name: date
        in: query
        required: true
        schema:
          type: string
      - name: passengers
        in: query
        required: false
        schema:
          type: string
  /v1/public/trips/{trip_id}:
    get:
      summary: تفاصيل الرحلة والسياسات
      tags:
      - Public
      operationId: getTrip
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripSummary'
        '404':
          description: RESOURCE_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '409':
          description: TRIP_NOT_BOOKABLE
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      parameters:
      - name: trip_id
        in: path
        required: true
        schema:
          type: string
  /v1/public/trips/{trip_id}/seats:
    get:
      summary: خريطة المقاعد المتاحة
      tags:
      - Public
      operationId: getSeatMap
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatMap'
        '404':
          description: RESOURCE_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '409':
          description: TRIP_NOT_BOOKABLE
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      parameters:
      - name: trip_id
        in: path
        required: true
        schema:
          type: string
      - name: session_token
        in: query
        required: false
        schema:
          type: string
  /v1/public/trips/{trip_id}/seat-holds:
    post:
      summary: إنشاء حجز مؤقت للمقاعد
      tags:
      - Booking
      operationId: createSeatHold
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeatHold'
        '409':
          description: SEAT_NOT_AVAILABLE / SEAT_GENDER_CONFLICT / PRICE_CHANGED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '429':
          description: RATE_LIMITED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeatHoldRequest'
      parameters:
      - name: trip_id
        in: path
        required: true
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/seat-holds/{hold_token}/release:
    post:
      summary: تحرير الحجز المؤقت
      tags:
      - Booking
      operationId: releaseSeatHold
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  released:
                    type: boolean
        '403':
          description: SEAT_HOLD_NOT_OWNED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      parameters:
      - name: hold_token
        in: path
        required: true
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/bookings:
    post:
      summary: إنشاء الحجز النهائي
      tags:
      - Booking
      operationId: createBooking
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          description: SEAT_HOLD_EXPIRED / SEAT_NOT_AVAILABLE / SEAT_GENDER_CONFLICT / PRICE_CHANGED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '428':
          description: POLICY_ACCEPTANCE_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '400':
          description: IDEMPOTENCY_KEY_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/bookings/lookup:
    post:
      summary: استرجاع حجز كضيف
      tags:
      - Booking
      operationId: lookupBooking
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: RESOURCE_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '429':
          description: RATE_LIMITED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - pnr
              - contact_verifier
              properties:
                pnr:
                  type: string
                contact_verifier:
                  type: string
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/bookings/{pnr}:
    get:
      summary: عرض الحجز عبر رمز الإدارة
      tags:
      - Booking
      operationId: getGuestBooking
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: RESOURCE_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '401':
          description: AUTH_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      parameters:
      - name: pnr
        in: path
        required: true
        schema:
          type: string
      - name: manage_token
        in: query
        required: true
        schema:
          type: string
  /v1/public/bookings/{pnr}/cancellation-quote:
    get:
      summary: حساب الإلغاء قبل التنفيذ
      tags:
      - Booking
      operationId: getCancellationQuote
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationQuote'
        '409':
          description: CANCELLATION_NOT_ALLOWED / PASSENGER_ALREADY_BOARDED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      parameters:
      - name: pnr
        in: path
        required: true
        schema:
          type: string
      - name: manage_token
        in: query
        required: true
        schema:
          type: string
  /v1/public/bookings/{pnr}/cancel:
    post:
      summary: طلب إلغاء الحجز
      tags:
      - Booking
      operationId: cancelGuestBooking
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          description: CANCELLATION_NOT_ALLOWED / PASSENGER_ALREADY_BOARDED / VERSION_CONFLICT
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - quote_token
              properties:
                quote_token:
                  type: string
                reason_code:
                  type: string
      parameters:
      - name: pnr
        in: path
        required: true
        schema:
          type: string
      - name: manage_token
        in: query
        required: true
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/bookings/{pnr}/payments:
    post:
      summary: بدء عملية دفع
      tags:
      - Payments
      operationId: createPaymentIntent
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '409':
          description: PAYMENT_ALREADY_SUCCEEDED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '503':
          description: PAYMENT_PROVIDER_UNAVAILABLE
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '400':
          description: IDEMPOTENCY_KEY_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - method_type
              properties:
                method_type:
                  type: string
                return_url:
                  type:
                  - string
                  - 'null'
                  format: uri
      parameters:
      - name: pnr
        in: path
        required: true
        schema:
          type: string
      - name: manage_token
        in: query
        required: true
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/payment-intents/{intent_id}/manual-transfer:
    post:
      summary: رفع بيانات تحويل يدوي
      tags:
      - Payments
      operationId: submitManualTransfer
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '409':
          description: MANUAL_TRANSFER_DUPLICATE / PAYMENT_STATE_CONFLICT
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualTransferRequest'
      parameters:
      - name: intent_id
        in: path
        required: true
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/public/bookings/{pnr}/support-cases:
    post:
      summary: فتح حالة دعم للحجز
      tags:
      - Support
      operationId: openGuestSupportCase
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportCase'
        '422':
          description: VALIDATION_ERROR
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '429':
          description: RATE_LIMITED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - category
              - priority
              - message
              properties:
                category:
                  type: string
                priority:
                  type: string
                message:
                  type: string
                attachments:
                  type: array
                  items:
                    type: string
      parameters:
      - name: pnr
        in: path
        required: true
        schema:
          type: string
      - name: manage_token
        in: query
        required: true
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/auth/login:
    post:
      summary: تسجيل الدخول
      tags:
      - Auth
      operationId: login
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  mfa_required:
                    type: boolean
        '401':
          description: AUTH_INVALID_CREDENTIALS
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_MFA_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '429':
          description: RATE_LIMITED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - identifier
              - password
              properties:
                identifier:
                  type: string
                password:
                  type: string
  /v1/auth/mfa/verify:
    post:
      summary: إكمال MFA
      tags:
      - Auth
      operationId: verifyMfa
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        '403':
          description: AUTH_MFA_INVALID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '429':
          description: RATE_LIMITED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - challenge_id
              - code
              properties:
                challenge_id:
                  type: string
                code:
                  type: string
  /v1/me/bookings:
    get:
      summary: حجوزاتي
      tags:
      - Customer
      operationId: listMyBookings
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '401':
          description: AUTH_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
      - name: cursor
        in: query
        required: false
        schema:
          type: string
  /v1/me/bookings/{booking_id}:
    get:
      summary: تفاصيل حجز الحساب
      tags:
      - Customer
      operationId: getMyBooking
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: RESOURCE_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
      parameters:
      - name: booking_id
        in: path
        required: true
        schema:
          type: string
  /v1/me/sessions:
    get:
      summary: الجلسات والأجهزة
      tags:
      - Customer
      operationId: listSessions
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
      security:
      - bearerAuth: []
  /v1/me/data-export:
    post:
      summary: طلب تصدير البيانات
      tags:
      - Privacy
      operationId: requestDataExport
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  status:
                    type: string
        '409':
          description: LEGAL_HOLD_ACTIVE
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/me/delete-account:
    post:
      summary: طلب حذف الحساب
      tags:
      - Privacy
      operationId: requestAccountDeletion
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
        '403':
          description: AUTH_MFA_REQUIRED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '409':
          description: LEGAL_HOLD_ACTIVE
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - confirmation
              properties:
                confirmation:
                  type: string
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/office/context:
    get:
      summary: سياق المكتب والصلاحيات
      tags:
      - Office
      operationId: getOfficeContext
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: object
                properties:
                  office:
                    $ref: '#/components/schemas/Office'
                  permissions:
                    type: array
                    items:
                      type: string
                  configuration:
                    type: object
                    additionalProperties: true
        '403':
          description: TENANT_ACCESS_DENIED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
  /v1/office/trips:
    get:
      summary: قائمة رحلات المكتب
      tags:
      - Office Trips
      operationId: listOfficeTrips
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfficeTrip'
        '403':
          description: PERMISSION_DENIED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
      - name: date_from
        in: query
        required: false
        schema:
          type: string
      - name: date_to
        in: query
        required: false
        schema:
          type: string
    post:
      summary: إنشاء رحلة
      tags:
      - Office Trips
      operationId: createOfficeTrip
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficeTrip'
        '403':
          description: PERMISSION_DENIED
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
        '422':
          description: TRIP_NOT_READY / VERIFICATION_INCOMPLETE
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/Error'
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 120
  /v1/office/trips/{trip_id}:
    get:
      summary: تفاصيل رحلة المكتب
      tags:
      - Office Trips
      operationId: getOfficeTrip
      responses:
        '200':
          description: نجاح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficeTrip'
        '404':
          description: RESOURCE_NOT_FOUND
          content:
