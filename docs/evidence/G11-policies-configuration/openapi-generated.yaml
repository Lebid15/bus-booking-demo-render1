components:
  schemas:
    ActionEnum:
      enum:
      - propose
      - approve
      type: string
      description: |-
        * `propose` - propose
        * `approve` - approve
    ActiveInactiveStatus:
      enum:
      - active
      - inactive
      type: string
      description: |-
        * `active` - Active
        * `inactive` - Inactive
    BoardingCommand:
      type: object
      properties:
        command:
          $ref: '#/components/schemas/BoardingCommandCommandEnum'
        ticket_qr:
          type: string
          nullable: true
        passenger_id:
          type: string
          format: uuid
          nullable: true
        reason_code:
          type: string
          nullable: true
          maxLength: 80
        offline_event_id:
          type: string
          nullable: true
          maxLength: 80
        occurred_at:
          type: string
          format: date-time
        correction_approval_id:
          type: string
          format: uuid
          nullable: true
      required:
      - command
    BoardingCommandCommandEnum:
      enum:
      - arrive
      - verify
      - board
      - reverse
      - deny
      - no_show
      type: string
      description: |-
        * `arrive` - arrive
        * `verify` - verify
        * `board` - board
        * `reverse` - reverse
        * `deny` - deny
        * `no_show` - no_show
    BoardingResult:
      type: object
      properties:
        passenger_id:
          type: string
          format: uuid
        boarding_status:
          type: string
        ticket_status:
          type: string
          nullable: true
      required:
      - boarding_status
      - passenger_id
      - ticket_status
    BookingContact:
      type: object
      properties:
        name:
          type: string
          maxLength: 160
          minLength: 2
        phone:
          type: string
          maxLength: 20
          minLength: 8
        email:
          type: string
          format: email
          nullable: true
      required:
      - name
      - phone
    BookingContactOutput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
          nullable: true
      required:
      - email
      - name
      - phone
    BookingLookupRequest:
      type: object
      properties:
        pnr:
          type: string
          maxLength: 12
          minLength: 6
        contact_verifier:
          type: string
          maxLength: 254
          minLength: 4
      required:
      - contact_verifier
      - pnr
    BookingPassengerOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        gender:
          type: string
        passenger_type:
          type: string
        date_of_birth:
          type: string
          format: date
          nullable: true
        nationality_code:
          type: string
          nullable: true
        boarding_status:
          type: string
        status:
          type: string
        seat_id:
          type: string
          format: uuid
          nullable: true
        seat_code:
          type: string
          nullable: true
        ticket:
          allOf:
          - $ref: '#/components/schemas/TicketOutput'
          nullable: true
      required:
      - boarding_status
      - date_of_birth
      - full_name
      - gender
      - id
      - nationality_code
      - passenger_type
      - seat_code
      - seat_id
      - status
      - ticket
    BookingPaymentMethod:
      enum:
      - office_cash
      - manual_transfer
      - electronic
      type: string
      description: |-
        * `office_cash` - Office cash
        * `manual_transfer` - Manual transfer
        * `electronic` - Electronic
    BookingQuote:
      type: object
      properties:
        subtotal:
          $ref: '#/components/schemas/Money'
        discount:
          $ref: '#/components/schemas/Money'
        fees:
          $ref: '#/components/schemas/Money'
        total:
          $ref: '#/components/schemas/Money'
        payment_deadline_at:
          type: string
          format: date-time
          nullable: true
        policy_version_ids:
          type: array
          items:
            type: string
        quote_version:
          type: integer
      required:
      - discount
      - fees
      - payment_deadline_at
      - policy_version_ids
      - quote_version
      - subtotal
      - total
    BookingTripChange:
      type: object
      properties:
        change_id:
          type: string
          format: uuid
        change_type:
          type: string
        classification:
          type: string
        status:
          type: string
        response_deadline_at:
          type: string
          format: date-time
          nullable: true
        previous_snapshot: {}
        new_snapshot: {}
      required:
      - change_id
      - change_type
      - classification
      - new_snapshot
      - previous_snapshot
      - response_deadline_at
      - status
    BookingTripLocation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
      - id
      - name
    BookingTripOffice:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
      - id
      - name
    BookingTripSummary:
      type: object
      properties:
        id:
          type: string
        departure_at:
          type: string
          format: date-time
        arrival_at:
          type: string
          format: date-time
          nullable: true
        origin:
          $ref: '#/components/schemas/BookingTripLocation'
        destination:
          $ref: '#/components/schemas/BookingTripLocation'
        office:
          $ref: '#/components/schemas/BookingTripOffice'
      required:
      - arrival_at
      - departure_at
      - destination
      - id
      - office
      - origin
    CalculationTypeEnum:
      enum:
      - percentage
      - fixed
      - hybrid
      type: string
      description: |-
        * `percentage` - percentage
        * `fixed` - fixed
        * `hybrid` - hybrid
    CancelBookingRequest:
      type: object
      properties:
        quote_token:
          type: string
          minLength: 20
        reason_code:
          type: string
          maxLength: 80
      required:
      - quote_token
    CancellationPassengerQuote:
      type: object
      properties:
        passenger_id:
          type: string
          format: uuid
        full_name:
          type: string
        seat_id:
          type: string
          format: uuid
        seat_code:
          type: string
        subtotal_amount:
          type: string
        discount_amount:
          type: string
        fee_amount:
          type: string
        total_amount:
          type: string
        refund_amount:
          type: string
        retained_amount:
          type: string
      required:
      - discount_amount
      - fee_amount
      - full_name
      - passenger_id
      - refund_amount
      - retained_amount
      - seat_code
      - seat_id
      - subtotal_amount
      - total_amount
    CancellationQuoteResponse:
      type: object
      properties:
        allowed:
          type: boolean
        refund_amount:
          $ref: '#/components/schemas/Money'
        retained_amount:
          $ref: '#/components/schemas/Money'
        reason:
          type: string
        expires_at:
          type: string
          format: date-time
        quote_token:
          type: string
        passengers:
          type: array
          items:
            $ref: '#/components/schemas/CancellationPassengerQuote'
      required:
      - allowed
      - expires_at
      - passengers
      - quote_token
      - reason
      - refund_amount
      - retained_amount
    Chargeback:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider_case_id:
          type: string
        status:
          type: string
        amount:
          type: string
        currency:
          type: string
        booking_id:
          type: string
        opened_at:
          type: string
          format: date-time
        deadline_at:
          type: string
          format: date-time
          nullable: true
      required:
      - amount
      - booking_id
      - currency
      - deadline_at
      - id
      - opened_at
      - provider_case_id
      - status
    ChoiceEnum:
      enum:
      - accept
      - alternative
      - refund
      type: string
      description: |-
        * `accept` - accept
        * `alternative` - alternative
        * `refund` - refund
    CommissionProfile:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
          maxLength: 80
        name:
          type: string
          maxLength: 160
        calculation_type:
          $ref: '#/components/schemas/CalculationTypeEnum'
        percentage_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          default: '0.000000'
        fixed_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,2})?$
          default: '0.00'
        currency:
          type: string
          nullable: true
          maxLength: 3
          minLength: 3
        status:
          type: string
          default: draft
          maxLength: 20
        version:
          type: integer
        effective_from:
          type: string
          format: date-time
          nullable: true
      required:
      - calculation_type
      - code
      - name
    CreateBookingRequest:
      type: object
      properties:
        trip_id:
          type: string
          maxLength: 26
        hold_token:
          type: string
          maxLength: 200
          minLength: 36
        contact:
          $ref: '#/components/schemas/BookingContact'
        passengers:
          type: array
          items:
            $ref: '#/components/schemas/PassengerInput'
        payment_method:
          $ref: '#/components/schemas/BookingPaymentMethod'
        accepted_policy_version_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        client_reference:
          type: string
