openapi: 3.0.3
info:
  title: Bus Booking Platform API
  version: 4.0.0-foundation
paths:
  /health/live:
    get:
      operationId: health_live_retrieve
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveHealth'
          description: ''
  /health/ready:
    get:
      operationId: health_ready_retrieve
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyHealth'
          description: ''
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyHealth'
          description: ''
  /v1/auth/login:
    post:
      operationId: v1_auth_login_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /v1/auth/mfa/verify:
    post:
      operationId: v1_auth_mfa_verify_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MfaVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MfaVerify'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /v1/auth/register:
    post:
      operationId: v1_auth_register_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /v1/auth/register/verify:
    post:
      operationId: v1_auth_register_verify_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationVerify'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /v1/me/sessions:
    get:
      operationId: v1_me_sessions_list
      tags:
      - v1
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
          description: ''
  /v1/me/sessions/{session_id}:
    delete:
      operationId: v1_me_sessions_destroy
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /v1/office/context:
    get:
      operationId: v1_office_context_retrieve
      tags:
      - v1
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
components:
  schemas:
    LiveHealth:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
      required:
      - service
      - status
    Login:
      type: object
      properties:
        identifier:
          type: string
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - identifier
      - password
    MfaVerify:
      type: object
      properties:
        challenge_id:
          type: string
          maxLength: 100
        code:
          type: string
          pattern: ^\d{6,8}$
      required:
      - challenge_id
      - code
    ReadyHealth:
      type: object
      properties:
        status:
          type: string
        checks:
          type: object
          additionalProperties:
            type: string
      required:
      - checks
      - status
    Register:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 160
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
          maxLength: 30
        password:
          type: string
          writeOnly: true
          maxLength: 128
          minLength: 10
      required:
      - full_name
      - password
    RegistrationVerify:
      type: object
      properties:
        challenge_id:
          type: string
          maxLength: 100
        code:
          type: string
          pattern: ^\d{6}$
      required:
      - challenge_id
      - code
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        device:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        user_agent:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        current:
          type: boolean
          readOnly: true
      required:
      - created_at
      - current
      - device
      - expires_at
      - id
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
