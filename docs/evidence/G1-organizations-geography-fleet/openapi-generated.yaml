components:
  schemas:
    CommandEnum:
      enum:
      - submit
      - start_review
      - request_info
      - resubmit
      - external_check
      - conditional_approve
      - approve
      - reject
      - expire
      type: string
      description: |-
        * `submit` - submit
        * `start_review` - start_review
        * `request_info` - request_info
        * `resubmit` - resubmit
        * `external_check` - external_check
        * `conditional_approve` - conditional_approve
        * `approve` - approve
        * `reject` - reject
        * `expire` - expire
    Driver:
      type: object
      properties:
        id:
          type: string
        full_name:
          type: string
          maxLength: 160
        phone:
          type: string
          nullable: true
          maxLength: 20
        license_last4:
          type: string
          nullable: true
          maxLength: 8
        license_expires_at:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/StatusD91Enum'
      required:
      - full_name
      - id
    DriverWrite:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 160
        phone:
          type: string
          nullable: true
          maxLength: 20
        license_number:
          type: string
          writeOnly: true
          maxLength: 100
        license_expires_at:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/StatusD91Enum'
    LayoutTypeEnum:
