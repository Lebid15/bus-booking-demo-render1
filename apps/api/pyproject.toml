[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]
addopts = "-q --strict-markers --disable-warnings"
markers = [
  "integration: database-backed integration tests",
  "security: security behavior tests",
  "postgresql: requires PostgreSQL-specific locking or constraints",
]

[tool.ruff]
target-version = "py313"
line-length = 120
exclude = ["**/migrations/*.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "DJ"]
ignore = ["DJ001", "DJ008"]

[tool.ruff.lint.isort]
known-first-party = ["adminops", "auditlog", "boarding", "bookings", "common", "config", "finance", "fleet", "geography", "identity", "organizations", "notifications", "payments", "policies", "securityops", "subscriptions", "tickets", "trips"]

[tool.mypy]
python_version = "3.13"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
strict = true
warn_unused_ignores = true
exclude = ["migrations"]

[tool.django-stubs]
django_settings_module = "config.settings"
